<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Typing Test</title>
    <link rel="stylesheet" href="./styles.css" />

    <!-- icon packs -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
    />
    <script
      src="https://kit.fontawesome.com/e3ba811d50.js"
      crossorigin="anonymous"
    ></script>

    <!-- JetBrains Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <div class="top">
        <div>
          <i class="fa-solid fa-clock icon"></i
          ><span data-function="timer"></span>
        </div>
        <div>
          <i class="fa-solid fa-spell-check icon"></i
          ><span data-function="accuracy">98%</span>
        </div>
        <div>
          <i class="fa-solid fa-gauge-high icon"></i
          ><span data-function="wpm">27WPM</span>
        </div>
        <button aria-label="close"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="content">
        <div class="text-box"></div>
        <div class="keyboard">
          <div class="key-row">
            <div class="key" data-normal-value="`">`</div>
            <div
              class="key dual-char"
              data-normal-value="1"
              data-shift-value="!"
            >
              <span>!</span>1
            </div>
            <div
              class="key dual-char"
              data-normal-value="2"
              data-shift-value="@"
            >
              <span>@</span>2
            </div>
            <div
              class="key dual-char"
              data-normal-value="3"
              data-shift-value="£"
            >
              <span>£</span>3
            </div>
            <div
              class="key dual-char"
              data-normal-value="4"
              data-shift-value="$"
            >
              <span>$</span>4
            </div>
            <div
              class="key dual-char"
              data-normal-value="5"
              data-shift-value="%"
            >
              <span>%</span>5
            </div>
            <div
              class="key dual-char"
              data-normal-value="6"
              data-shift-value="^"
            >
              <span>^</span>6
            </div>
            <div
              class="key dual-char"
              data-normal-value="7"
              data-shift-value="&"
            >
              <span>&amp;</span>7
            </div>
            <div
              class="key dual-char"
              data-normal-value="8"
              data-shift-value="*"
            >
              <span>*</span>8
            </div>
            <div
              class="key dual-char"
              data-normal-value="9"
              data-shift-value="("
            >
              <span>(</span>9
            </div>
            <div
              class="key dual-char"
              data-normal-value="0"
              data-shift-value=")"
            >
              <span>)</span>0
            </div>
            <div
              class="key dual-char"
              data-normal-value="-"
              data-shift-value="_"
            >
              <span>_</span>-
            </div>
            <div
              class="key dual-char"
              data-normal-value="="
              data-shift-value="+"
            >
              <span>+</span>=
            </div>
            <div class="key modkey-sm" data-normal-value="backspace">
              <i class="bi bi-backspace"></i>
            </div>
          </div>
          <div class="key-row">
            <div class="key modkey-sm" data-normal-value="tab">tab</div>
            <div class="key alphabet" data-normal-value="q">q</div>
            <div class="key alphabet" data-normal-value="w">w</div>
            <div class="key alphabet" data-normal-value="e">e</div>
            <div class="key alphabet" data-normal-value="r">r</div>
            <div class="key alphabet" data-normal-value="t">t</div>
            <div class="key alphabet" data-normal-value="y">y</div>
            <div class="key alphabet" data-normal-value="u">u</div>
            <div class="key alphabet" data-normal-value="i">i</div>
            <div class="key alphabet" data-normal-value="o">o</div>
            <div class="key alphabet" data-normal-value="p">p</div>
            <div
              class="key dual-char"
              data-normal-value="["
              data-shift-value="{"
            >
              <span>{</span>[
            </div>
            <div
              class="key dual-char"
              data-normal-value="]"
              data-shift-value="}"
            >
              <span>}</span>]
            </div>
            <div
              class="key dual-char"
              data-normal-value="\"
              data-shift-value="|"
            >
              <span>|</span>\
            </div>
          </div>
          <div class="key-row">
            <div class="key modkey-md" data-normal-value="capslock">caps</div>
            <div class="key alphabet" data-normal-value="a">a</div>
            <div class="key alphabet" data-normal-value="s">s</div>
            <div class="key alphabet" data-normal-value="d">d</div>
            <div class="key alphabet" data-normal-value="f">f</div>
            <div class="key alphabet" data-normal-value="g">g</div>
            <div class="key alphabet" data-normal-value="h">h</div>
            <div class="key alphabet" data-normal-value="j">j</div>
            <div class="key alphabet" data-normal-value="k">k</div>
            <div class="key alphabet" data-normal-value="l">l</div>
            <div
              class="key dual-char"
              data-normal-value=";"
              data-shift-value=":"
            >
              <span>:</span>;
            </div>
            <div
              class="key dual-char"
              data-normal-value="'"
              data-shift-value='"'
            >
              <span>"</span>'
            </div>
            <div class="key modkey-sm" data-normal-value="enter">enter</div>
          </div>
          <div class="key-row">
            <div class="key modkey-lg" data-normal-value="shift">shift</div>
            <div class="key alphabet" data-normal-value="z">z</div>
            <div class="key alphabet" data-normal-value="x">x</div>
            <div class="key alphabet" data-normal-value="c">c</div>
            <div class="key alphabet" data-normal-value="v">v</div>
            <div class="key alphabet" data-normal-value="b">b</div>
            <div class="key alphabet" data-normal-value="n">n</div>
            <div class="key alphabet" data-normal-value="m">m</div>
            <div
              class="key dual-char"
              data-normal-value=","
              data-shift-value="<"
            >
              <span>&lt;</span>,
            </div>
            <div
              class="key dual-char"
              data-normal-value="."
              data-shift-value=">"
            >
              <span>&gt;</span>.
            </div>
            <div
              class="key dual-char"
              data-normal-value="/"
              data-shift-value="?"
            >
              <span>?</span>/
            </div>
            <div class="key modkey-lg" data-normal-value="shift">shift</div>
          </div>
          <div class="key-row">
            <div class="key modkey-md">control</div>
            <div class="key modkey-md">option</div>
            <div class="key" data-normal-value=" "></div>
            <div class="key modkey-md">option</div>
            <div class="key modkey-md">control</div>
          </div>
        </div>
      </div>
      <div class="bottom"><button>reset</button></div>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
