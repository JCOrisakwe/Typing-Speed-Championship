<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Typing Test</title>

    <link rel="stylesheet" href="css/index.css" />
    <link rel="stylesheet" href="css/test.css" />
    <link rel="stylesheet" href="css/stats.css" />

    <!-- icon packs -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
    />

    <!-- JetBrains Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <!-- SCREEN 1: HOME SCREEN -->
      <div class="home-screen screen"></div>

      <!-- SCREEN 2: TEST SCREEN -->
      <div class="test-screen screen">
        <div class="test-screen__body">
          <div class="test-screen__header">
            <div>
              <i class="fa-solid fa-clock icon"></i
              ><span data-stat="time-left"></span>
            </div>
            <div>
              <i class="fa-solid fa-spell-check icon"></i
              ><span data-stat="accuracy"></span>%
            </div>
            <div>
              <i class="fa-solid fa-gauge-high icon"></i
              ><span data-stat="wpm"></span>wpm
            </div>
            <button aria-label="close">
              <i class="fa-solid fa-xmark close-icon"></i>
            </button>
          </div>
          <div class="test-screen__main">
            <div class="text-box"></div>
            <div class="keyboard" aria-hidden="true">
              <div class="key-row">
                <div class="key" data-key-value-1="`">`</div>
                <div
                  class="key dual-char"
                  data-key-value-1="1"
                  data-key-value-2="!"
                >
                  <span>!</span>1
                </div>
                <div
                  class="key dual-char"
                  data-key-value-1="2"
                  data-key-value-2="@"
                >
                  <span>@</span>2
                </div>
                <div
                  class="key dual-char"
                  data-key-value-1="3"
                  data-key-value-2="£"
                >
                  <span>£</span>3
                </div>
                <div
                  class="key dual-char"
                  data-key-value-1="4"
                  data-key-value-2="$"
                >
                  <span>$</span>4
                </div>
                <div
                  class="key dual-char"
                  data-key-value-1="5"
                  data-key-value-2="%"
                >
                  <span>%</span>5
                </div>
                <div
                  class="key dual-char"
                  data-key-value-1="6"
                  data-key-value-2="^"
                >
                  <span>^</span>6
                </div>
                <div
                  class="key dual-char"
                  data-key-value-1="7"
                  data-key-value-2="&"
                >
                  <span>&amp;</span>7
                </div>
                <div
                  class="key dual-char"
                  data-key-value-1="8"
                  data-key-value-2="*"
                >
                  <span>*</span>8
                </div>
                <div
                  class="key dual-char"
                  data-key-value-1="9"
                  data-key-value-2="("
                >
                  <span>(</span>9
                </div>
                <div
                  class="key dual-char"
                  data-key-value-1="0"
                  data-key-value-2=")"
                >
                  <span>)</span>0
                </div>
                <div
                  class="key dual-char"
                  data-key-value-1="-"
                  data-key-value-2="_"
                >
                  <span>_</span>-
                </div>
                <div
                  class="key dual-char"
                  data-key-value-1="="
                  data-key-value-2="+"
                >
                  <span>+</span>=
                </div>
                <div class="key modkey-sm" data-key-value-1="backspace">
                  <i class="bi bi-backspace"></i>
                </div>
              </div>
              <div class="key-row">
                <div class="key modkey-sm" data-key-value-1="tab">tab</div>
                <div class="key alphabet" data-key-value-1="q">q</div>
                <div class="key alphabet" data-key-value-1="w">w</div>
                <div class="key alphabet" data-key-value-1="e">e</div>
                <div class="key alphabet" data-key-value-1="r">r</div>
                <div class="key alphabet" data-key-value-1="t">t</div>
                <div class="key alphabet" data-key-value-1="y">y</div>
                <div class="key alphabet" data-key-value-1="u">u</div>
                <div class="key alphabet" data-key-value-1="i">i</div>
                <div class="key alphabet" data-key-value-1="o">o</div>
                <div class="key alphabet" data-key-value-1="p">p</div>
                <div
                  class="key dual-char"
                  data-key-value-1="["
                  data-key-value-2="{"
                >
                  <span>{</span>[
                </div>
                <div
                  class="key dual-char"
                  data-key-value-1="]"
                  data-key-value-2="}"
                >
                  <span>}</span>]
                </div>
                <div
                  class="key dual-char"
                  data-key-value-1="\"
                  data-key-value-2="|"
                >
                  <span>|</span>\
                </div>
              </div>
              <div class="key-row">
                <div class="key modkey-md" data-key-value-1="capslock">
                  caps
                </div>
                <div class="key alphabet" data-key-value-1="a">a</div>
                <div class="key alphabet" data-key-value-1="s">s</div>
                <div class="key alphabet" data-key-value-1="d">d</div>
                <div class="key alphabet" data-key-value-1="f">f</div>
                <div class="key alphabet" data-key-value-1="g">g</div>
                <div class="key alphabet" data-key-value-1="h">h</div>
                <div class="key alphabet" data-key-value-1="j">j</div>
                <div class="key alphabet" data-key-value-1="k">k</div>
                <div class="key alphabet" data-key-value-1="l">l</div>
                <div
                  class="key dual-char"
                  data-key-value-1=";"
                  data-key-value-2=":"
                >
                  <span>:</span>;
                </div>
                <div
                  class="key dual-char"
                  data-key-value-1="'"
                  data-key-value-2='"'
                >
                  <span>"</span>'
                </div>
                <div class="key modkey-sm" data-key-value-1="enter">enter</div>
              </div>
              <div class="key-row">
                <div class="key modkey-lg" data-key-value-1="shift">shift</div>
                <div class="key alphabet" data-key-value-1="z">z</div>
                <div class="key alphabet" data-key-value-1="x">x</div>
                <div class="key alphabet" data-key-value-1="c">c</div>
                <div class="key alphabet" data-key-value-1="v">v</div>
                <div class="key alphabet" data-key-value-1="b">b</div>
                <div class="key alphabet" data-key-value-1="n">n</div>
                <div class="key alphabet" data-key-value-1="m">m</div>
                <div
                  class="key dual-char"
                  data-key-value-1=","
                  data-key-value-2="<"
                >
                  <span>&lt;</span>,
                </div>
                <div
                  class="key dual-char"
                  data-key-value-1="."
                  data-key-value-2=">"
                >
                  <span>&gt;</span>.
                </div>
                <div
                  class="key dual-char"
                  data-key-value-1="/"
                  data-key-value-2="?"
                >
                  <span>?</span>/
                </div>
                <div class="key modkey-lg" data-key-value-1="shift">shift</div>
              </div>
              <div class="key-row">
                <div class="key modkey-md">control</div>
                <div class="key modkey-md">option</div>
                <div class="key" data-key-value-1=" "></div>
                <div class="key modkey-md">option</div>
                <div class="key modkey-md">control</div>
              </div>
            </div>
          </div>
          <div class="test-screen__footer"><button>reset</button></div>
        </div>
      </div>

      <!-- SCREEN 3: STATS SCREEN -->
      <div class="stats-screen screen"></div>
    </main>
    <script src="js/main.js"></script>
    <script src="js/test.js"></script>
    <script
      src="https://kit.fontawesome.com/e3ba811d50.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
